<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Factory Location Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#111}
#sidebar{width:300px;flex-shrink:0;background:#1a1a2e;color:#ccc;overflow-y:auto;border-right:2px solid #333;display:flex;flex-direction:column}
#sidebar h1{font-size:14px;padding:10px 12px;background:#16213e;color:#e0e0e0;letter-spacing:1px;text-transform:uppercase}
#legend{padding:8px 12px;border-bottom:1px solid #333;font-size:11px}
#legend .row{display:flex;align-items:center;gap:6px;margin:2px 0}
#legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
#legend .ic{display:inline-flex;width:15px;height:15px;flex-shrink:0}
#legend .ic svg{width:15px;height:15px}
#factory-list{flex:1;overflow-y:auto;padding:0}
.factory-section{border-bottom:1px solid #333;padding:10px 12px}
.factory-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.factory-header input[type=checkbox]{cursor:pointer;accent-color:inherit;width:14px;height:14px;flex-shrink:0}
.factory-section.hidden-factory{opacity:0.4}
.factory-section.hidden-factory .loc-option,.factory-section.hidden-factory .zoom-btn{pointer-events:none;opacity:0.3}
.factory-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.factory-name{font-weight:bold;font-size:13px;color:#fff}
.factory-theme{font-size:11px;color:#888;margin-bottom:6px}
.factory-resources{font-size:10px;color:#666;margin-bottom:8px}
.loc-option{display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer;font-size:11px}
.loc-option:hover{color:#fff}
.loc-option input{cursor:pointer;accent-color:inherit}
.loc-option .score{color:#aaa}
.loc-option .quad{color:#666;font-size:10px}
.loc-summary{font-size:10px;color:#555;margin-left:22px;margin-bottom:2px}
.zoom-btn{display:block;margin:6px 0 0 0;padding:4px 10px;background:#16213e;color:#7f8fa6;border:1px solid #333;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit}
.zoom-btn:hover{background:#1f3060;color:#fff}
#zoom-hud{position:absolute;right:14px;bottom:14px;display:flex;align-items:center;gap:6px;background:rgba(13,17,23,0.85);border:1px solid #333;border-radius:6px;padding:5px 7px;font-family:'Courier New',monospace;z-index:60;user-select:none}
#zoom-hud button{width:26px;height:26px;line-height:1;background:#16213e;color:#cfd6e4;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:15px;font-family:inherit}
#zoom-hud button:hover{background:#1f3060;color:#fff}
#zoom-hud #zoom-fit-btn{width:auto;padding:0 8px;font-size:11px}
#zoom-readout{min-width:46px;text-align:center;color:#9fb0c8;font-size:11px}
#controls{padding:10px 12px;border-top:1px solid #333}
#export-btn{width:100%;padding:8px;background:#0f3460;color:#e0e0e0;border:1px solid #444;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:bold;letter-spacing:1px}
#export-btn:hover{background:#1a5276}
#reset-btn{width:100%;padding:6px;margin-top:6px;background:#1a1a2e;color:#7f8fa6;border:1px solid #333;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px}
#reset-btn:hover{background:#16213e;color:#fff}
canvas{flex:1;min-width:0;display:block;cursor:grab}
canvas.grabbing{cursor:grabbing}
#tooltip{position:fixed;background:rgba(20,20,40,0.95);color:#ddd;padding:6px 10px;border-radius:4px;font-size:11px;font-family:'Courier New',monospace;pointer-events:none;display:none;border:1px solid #444;max-width:250px;z-index:100}
#tab-bar{display:flex;background:#16213e;border-bottom:2px solid #333;flex-shrink:0}
.tab-btn{padding:10px 24px;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:#7f8fa6;background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn:hover{color:#ccc}
.tab-btn.active{color:#e0e0e0;border-bottom-color:#e0e0e0}
#tab-content{display:flex;flex:1;overflow:hidden}
#map-view{display:flex;flex:1;overflow:hidden;position:relative}
.summary-banner{background:#1a1a2e;border:1px solid #333;border-radius:6px;padding:20px 24px;margin-bottom:24px}
.summary-banner h2{font-size:16px;color:#e0e0e0;margin-bottom:4px;letter-spacing:1px}
.summary-banner .meta{font-size:11px;color:#888;margin-bottom:16px}
.summary-table{width:100%;border-collapse:collapse;font-size:12px}
.summary-table th{text-align:left;color:#888;font-weight:normal;padding:4px 12px 4px 0;border-bottom:1px solid #333;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.summary-table td{padding:6px 12px 6px 0;border-bottom:1px solid #222}
.summary-table tr:last-child td{border-bottom:none;font-weight:bold;border-top:1px solid #555;color:#fff}
.summary-table .factory-accent{width:4px;padding:0 8px 0 0}
.summary-table .factory-accent span{display:inline-block;width:4px;height:16px;border-radius:2px}
.summary-table tr.clickable{cursor:pointer}
.summary-table tr.clickable:hover td{color:#fff}
.factory-nav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.factory-nav a{padding:6px 14px;background:#1a1a2e;border:1px solid #333;border-radius:4px;color:#ccc;text-decoration:none;font-size:12px;font-family:'Courier New',monospace}
.factory-nav a:hover{background:#16213e;color:#fff}
.factory-card{margin-bottom:32px;border-radius:6px;background:#1a1a2e;border:1px solid #333;overflow:hidden}
.factory-card-header{padding:16px 20px;border-left:4px solid #666}
.factory-card-header h3{font-size:15px;margin-bottom:2px}
.factory-card-header .recipe{font-size:11px;color:#888;margin-bottom:8px}
.factory-card-header .stats{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;margin-bottom:8px}
.factory-card-header .stats .stat{color:#aaa}
.factory-card-header .stats .stat b{color:#e0e0e0}
.raw-inputs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.raw-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#16213e;border:1px solid #333;border-radius:12px;font-size:10px;color:#ccc}
.raw-pill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.building-summary{padding:12px 20px;border-top:1px solid #333;font-size:11px;color:#aaa;display:flex;gap:12px;flex-wrap:wrap}
.building-summary span{white-space:nowrap}
.resource-supply{padding:12px 20px;border-top:1px solid #333}
.resource-supply h4{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.resource-supply table{width:100%;border-collapse:collapse;font-size:11px}
.resource-supply th{text-align:left;color:#666;font-weight:normal;padding:3px 8px 3px 0;font-size:10px;text-transform:uppercase}
.resource-supply td{padding:4px 8px 4px 0;border-top:1px solid #222}
.resource-supply .local{color:#2ecc71}
.resource-supply .train{color:#e67e22}
.resource-supply .surplus{color:#555}
.flow-diagram{padding:20px;min-height:120px;position:relative;overflow-x:auto}
.flow-columns{display:flex;gap:0;align-items:stretch;min-width:max-content}
.flow-column{display:flex;flex-direction:column;justify-content:center;gap:8px;padding:0 16px;min-width:110px}
.flow-node{background:#16213e;border:1px solid #333;border-radius:4px;padding:6px 8px;font-size:10px;min-width:100px;position:relative;cursor:pointer;transition:border-color 0.15s}
.flow-node .item-name{font-weight:bold;color:#e0e0e0;font-size:11px;margin-bottom:2px}
.flow-node .building-info{color:#888}
.flow-node .output-rate{color:#aaa;font-size:10px;margin-top:2px}
.flow-node.raw-input{background:#0d1117;border-style:dashed;border-color:#555}
.flow-node.raw-input .item-name{color:#aaa}
.flow-node.anchor{border:2px solid #666;background:#1f2940;position:relative}
.flow-node.anchor .anchor-label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:4px}
.flow-node.anchor .scaling{font-size:10px;color:#aaa;margin-top:6px;padding-top:6px;border-top:1px solid #333}
.flow-node.overclocked{border-color:#f39c12;box-shadow:0 0 6px rgba(243,156,18,0.2)}
.flow-node .shard-badge{display:inline-block;font-size:9px;color:#f39c12;margin-left:4px}
.flow-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.flow-svg text{fill:#666;font-size:9px;font-family:'Courier New',monospace}
.flow-tooltip{position:fixed;background:rgba(20,20,40,0.97);color:#ddd;padding:10px 14px;border-radius:4px;font-size:11px;font-family:'Courier New',monospace;pointer-events:none;display:none;border:1px solid #555;max-width:300px;z-index:200;white-space:pre-line;line-height:1.5}
.flow-node.selected{border-color:#7f8fa6;box-shadow:0 0 8px rgba(127,143,166,0.3)}
.mini-module{margin:8px 20px 16px;border:1px solid #333;border-radius:4px;background:#0d1117;overflow:hidden}
.mini-module-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.mini-module-header h4{font-size:12px;color:#e0e0e0;margin:0}
.mini-module-header .copies-badge{font-size:10px;padding:2px 8px;background:#f39c12;color:#111;border-radius:3px;font-weight:bold}
.mini-module-body{padding:0 14px 10px;font-size:10px;color:#aaa}
.mini-module-body .raw-list{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.mini-module-body .buildings-list{display:flex;gap:8px;flex-wrap:wrap}
.mini-module-body .buildings-list span{white-space:nowrap}
.manufacturer-card{margin:8px 20px 4px;padding:12px 14px;border:2px dashed #555;border-radius:4px;background:#1a1a2e}
.manufacturer-card h4{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.manufacturer-card .mfr-inputs{display:flex;gap:6px;flex-wrap:wrap}
.manufacturer-card .mfr-pill{padding:3px 8px;background:#16213e;border:1px solid #333;border-radius:12px;font-size:10px;color:#ccc}
.stage-header{padding:10px 20px;font-size:12px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:#888;border-top:1px solid #333;background:#16213e}
.module-detail-table{width:100%;border-collapse:collapse;font-size:11px;font-family:'Courier New',monospace}
.module-detail-table th{text-align:left;color:#666;font-weight:normal;padding:4px 10px;font-size:10px;text-transform:uppercase;border-bottom:1px solid #333}
.module-detail-table td{padding:5px 10px;border-top:1px solid #222}
.module-detail-table .row-input td{background:#0d2818}
.module-detail-table .row-intermediate td{background:#1a1a2e}
.module-detail-table .row-output td{background:#0d1b2a;font-weight:bold}
.module-detail-table .item-col{color:#e0e0e0}
.module-detail-table .rate-col{color:#aaa;text-align:right;white-space:nowrap}
.module-detail-table .recipe-col{color:#888}
.module-detail-table .building-col{color:#aaa;white-space:nowrap}
.module-detail-table .shard-indicator{color:#f39c12;margin-left:4px}
.module-detail-table .dash{color:#444}
.stage1-table{width:100%;border-collapse:collapse;font-size:11px;margin:0}
.stage1-table th{text-align:left;color:#666;font-weight:normal;padding:4px 10px;font-size:10px;text-transform:uppercase;border-bottom:1px solid #333}
.stage1-table td{padding:6px 10px;border-bottom:1px solid #222}
.stage1-table tr:last-child td{border-bottom:none}
.stage1-summary{padding:12px 20px;border-top:1px solid #333;font-size:11px;color:#aaa}
.stage1-summary .raw-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.belt-count{font-size:9px;color:#666;margin-left:2px}
/* === OCCUPIED NODES TAB === */
#occupied-header{position:sticky;top:0;z-index:5;background:#16213e;border-bottom:2px solid #333;padding:16px 24px}
#occupied-header h2{font-size:15px;color:#e0e0e0;letter-spacing:1px;margin-bottom:4px}
#occupied-header .occ-count{font-size:12px;color:#9fb0c8;margin-bottom:12px}
#occupied-header .occ-actions{display:flex;gap:8px;flex-wrap:wrap}
.occ-btn{padding:6px 12px;background:#0f3460;color:#e0e0e0;border:1px solid #444;border-radius:4px;cursor:pointer;font-family:'Courier New',monospace;font-size:11px}
.occ-btn:hover{background:#1a5276}
.occ-btn.secondary{background:#1a1a2e;color:#7f8fa6;border-color:#333}
.occ-btn.secondary:hover{background:#16213e;color:#fff}
.occ-group-head{font-size:12px;font-weight:bold;color:#e0e0e0;text-transform:uppercase;letter-spacing:1px;margin:18px 0 6px;padding-bottom:4px;border-bottom:1px solid #333;display:flex;align-items:center;gap:8px}
.occ-group-head .ic{display:inline-flex;width:18px;height:18px;flex-shrink:0}
.occ-group-head .ic svg{width:18px;height:18px}
.occ-group-head .occ-grp-count{color:#888;font-weight:normal;font-size:11px}
.occ-row{display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:4px;font-size:12px;cursor:pointer}
.occ-row:hover{background:#16213e}
.occ-row input[type=checkbox]{cursor:pointer;width:15px;height:15px;flex-shrink:0;accent-color:#2ecc71}
.occ-row .ic{display:inline-flex;width:20px;height:20px;flex-shrink:0}
.occ-row .ic svg{width:20px;height:20px}
.occ-row .occ-label{color:#ddd}
.occ-row .occ-miner{color:#666;font-size:11px;margin-left:auto;white-space:nowrap}
.occ-row.is-reuse{background:rgba(46,204,113,0.08)}
.occ-row.is-reuse .occ-label{color:#7fe0a8}
#picker-panel{position:absolute;left:14px;top:14px;width:236px;background:rgba(13,17,23,0.93);border:1px solid #2ecc71;border-radius:8px;padding:12px 14px;font-family:'Courier New',monospace;z-index:60;box-shadow:0 4px 18px rgba(0,0,0,0.55)}
#picker-panel .pp-title{font-size:12px;font-weight:bold;color:#7fe0a8;margin-bottom:8px;line-height:1.35}
#picker-panel .pp-count{font-size:12px;color:#cbd6e6;margin-bottom:8px}
#picker-panel .pp-count b{color:#2ecc71;font-size:15px}
#picker-panel .pp-legend{font-size:10px;color:#9fb0c8;margin-bottom:10px;display:flex;align-items:center;flex-wrap:wrap}
#picker-panel .pp-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;flex-shrink:0}
#picker-panel .pp-dot.reuse{background:#2ecc71}
#picker-panel .pp-dot.leave{background:#f39c12}
#picker-panel .pp-actions{display:flex;gap:6px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab('map')">Map</button>
  <button class="tab-btn" onclick="switchTab('crazy')">Factories</button>
</div>
<div id="tab-content">
  <div id="map-view">
    <div id="sidebar">
      <h1>Factory Location Planner</h1>
      <div id="legend"></div>
      <div id="factory-list"></div>
      <div id="controls">
        <label style="display:block;font-size:11px;color:#ccc;margin-bottom:6px">Filter to component:
          <select id="componentFilter" onchange="setComponentFilter(this.value)" style="width:100%;margin-top:3px;background:#16213e;color:#fff;border:1px solid #333;padding:4px;font-family:'Courier New',monospace;font-size:11px">
            <option value="all">All components</option>
          </select>
        </label>
        <button id="export-btn">EXPORT SELECTIONS</button>
        <button id="reset-btn">Reset View</button>
      </div>
    </div>
    <canvas id="map"></canvas>
    <div id="zoom-hud">
      <button id="zoom-out-btn" title="Zoom out (-)">−</button>
      <span id="zoom-readout">100%</span>
      <button id="zoom-in-btn" title="Zoom in (+)">+</button>
      <button id="zoom-fit-btn" title="Fit (0)">Fit</button>
    </div>
  </div>
  <div id="crazy-view" style="display:none;flex:1;overflow-y:auto;background:#0d1117;color:#ccc;padding:24px 32px;font-family:'Courier New',monospace">
    <div id="crazy-content" style="max-width:1400px;margin:0 auto;width:100%"></div>
  </div>
</div>
<div id="tooltip"></div>

<script>
// === TAB SWITCHING ===
let currentTab = 'map';
function switchTab(tab) {
  currentTab = tab;
  const mapVisible = (tab === 'map');
  document.getElementById('map-view').style.display = mapVisible ? 'flex' : 'none';
  document.getElementById('crazy-view').style.display = tab === 'crazy' ? 'flex' : 'none';
  document.querySelectorAll('.tab-btn').forEach(btn => {
    var btnTab = btn.textContent.trim().toLowerCase();
    btn.classList.toggle('active',
      (btnTab === 'map' && tab === 'map') ||
      (btnTab === 'factories' && tab === 'crazy'));
  });
  if (mapVisible) { resize(); draw(); }
  if (tab === 'crazy' && !crazyLoaded) { loadCrazy(); }
}
let crazyLoaded = false;
async function loadCrazy() {
  try {
    const resp = await fetch('factory-crazy.json');
    const data = await resp.json();
    crazyLoaded = true;
    renderCrazyTab(data);
  } catch (e) {
    document.getElementById('crazy-content').innerHTML = '<p style="color:#e74c3c">Failed to load factory-crazy.json: ' + e.message + '</p>';
  }
}
function renderCrazyTab(data) {
  var el = document.getElementById('crazy-content');
  var html = '';
  var S1_COLORS = {
    'Steel Ingot': '#3498db', 'Iron Ingot': '#e74c3c', 'Concrete': '#95a5a6',
    'Copper Ingot': '#e67e22', 'Caterium Ingot': '#f1c40f', 'Plastic': '#9b59b6',
    'Rubber': '#2ecc71', 'Aluminum Ingot': '#e91e63'
  };
  var RESOURCE_COLORS_MAP = {
    'Iron Ore': '#e74c3c', 'Limestone': '#95a5a6', 'Copper Ore': '#e67e22',
    'Coal': '#555', 'Crude Oil': '#9b59b6', 'Caterium Ore': '#f1c40f',
    'Bauxite': '#e91e63', 'Water': '#4fc3f7', 'Silica': '#00bcd4'
  };

  // Summary banner
  html += '<div class="summary-banner">';
  html += '<h2>' + data.meta.title + '</h2>';
  html += '<div class="meta">' + data.meta.description + ' | Belt: ' + data.meta.belt_limit + '/min | Max ' + data.meta.max_buildings + ' bldgs/module</div>';
  html += '</div>';

  for (var fid in data.factories) {
    if (!data.factories.hasOwnProperty(fid)) continue;
    var fac = data.factories[fid];
    var color = FACTORY_COLORS[fid] || '#666';

    html += '<div class="factory-card">';

    // Header
    html += '<div class="factory-card-header" style="border-left-color:' + color + '">';
    html += '<h3 style="color:' + color + '">' + fid.toUpperCase() + ' \u2014 ' + fac.theme + '</h3>';
    html += '<div class="recipe">' + fac.hmf_recipe + '</div>';
    html += '<div class="stats">';
    html += '<span class="stat"><b>' + fac.hmf_per_min + '</b> HMF/min per module</span>';
    html += '<span class="stat">\u00d7' + fac.num_manufacturers + ' manufacturers \u2192 <b>' + fac.target_hmf + '</b> HMF/min</span>';
    html += '</div>';
    html += '</div>';

    // Manufacturer card
    var mfr = fac.manufacturer;
    html += '<div class="manufacturer-card">';
    html += '<h4>\u2605 Manufacturer \u2014 ' + mfr.recipe + ' (' + mfr.power_mw + ' MW)</h4>';
    html += '<div class="mfr-inputs">';
    for (var inp in mfr.inputs) {
      html += '<span class="mfr-pill">' + inp + ' ' + mfr.inputs[inp] + '/min</span>';
    }
    html += '</div>';
    html += '</div>';

    // === STAGE 2 ===
    html += '<div class="stage-header">\u25B6 Stage 2 \u2014 Intermediate \u2192 Manufacturer Inputs</div>';

    for (var i = 0; i < fac.stage2_modules.length; i++) {
      var mm = fac.stage2_modules[i];

      html += '<div class="mini-module">';

      // Simplified header: name, copies, output rate
      html += '<div class="mini-module-header">';
      html += '<h4>' + mm.name + '</h4>';
      html += '<div style="display:flex;align-items:center;gap:8px">';
      if (mm.copies > 1) {
        html += '<span class="copies-badge">\u00d7' + mm.copies + ' copies</span>';
      }
      html += '<span style="font-size:10px;color:#aaa">\u2192 ' + mm.output_per_copy.toFixed(1) + '/min each</span>';
      html += '</div>';
      html += '</div>';

      // Detail table
      html += '<div style="padding:0 14px 10px">';
      html += '<table class="module-detail-table">';
      html += '<thead><tr><th>Item</th><th style="text-align:right">/mod</th><th style="text-align:right">Total</th><th>Recipe</th><th>Building</th><th style="text-align:right">Rate/bldg</th></tr></thead>';
      html += '<tbody>';

      // 1. Input rows (sorted alphabetically)
      var inputKeys = Object.keys(mm.inputs).sort();
      for (var j = 0; j < inputKeys.length; j++) {
        var inp = inputKeys[j];
        var perMod = mm.inputs[inp];
        var total = perMod * mm.copies;
        html += '<tr class="row-input">';
        html += '<td class="item-col">' + inp + '</td>';
        html += '<td class="rate-col">' + perMod.toFixed(1) + '/m</td>';
        html += '<td class="rate-col">' + total.toFixed(1) + '/m</td>';
        html += '<td class="dash">\u2014</td>';
        html += '<td class="dash">\u2014</td>';
        html += '<td class="dash">\u2014</td>';
        html += '</tr>';
      }

      // 2. Separate output step from intermediate steps
      var outputStep = null;
      var intermediateSteps = [];
      for (var si = 0; si < mm.steps.length; si++) {
        if (mm.steps[si].item === mm.product) {
          outputStep = mm.steps[si];
        } else {
          intermediateSteps.push(mm.steps[si]);
        }
      }

      // Intermediate step rows (dependency order from data)
      for (var s = 0; s < intermediateSteps.length; s++) {
        var step = intermediateSteps[s];
        var outRate = step.outputs[step.item] || Object.values(step.outputs)[0];
        var ratePerBldg = step.buildings_exact > 0 ? outRate / step.buildings_exact : 0;
        var shardHtml = step.shards_per_building > 0 ? '<span class="shard-indicator">\u26a1' + step.shards_per_building + '</span>' : '';
        html += '<tr class="row-intermediate">';
        html += '<td class="item-col">' + step.item + '</td>';
        html += '<td class="rate-col">' + outRate.toFixed(1) + '/m</td>';
        html += '<td class="rate-col">' + (outRate * mm.copies).toFixed(1) + '/m</td>';
        html += '<td class="recipe-col">' + step.recipe + '</td>';
        html += '<td class="building-col">' + step.building + ' \u00d7' + step.buildings_ceil + shardHtml + '</td>';
        html += '<td class="rate-col">' + ratePerBldg.toFixed(1) + '/m</td>';
        html += '</tr>';
      }

      // 3. Output row (always last)
      if (outputStep) {
        var outRate = outputStep.outputs[outputStep.item] || Object.values(outputStep.outputs)[0];
        var ratePerBldg = outputStep.buildings_exact > 0 ? outRate / outputStep.buildings_exact : 0;
        var shardHtml = outputStep.shards_per_building > 0 ? '<span class="shard-indicator">\u26a1' + outputStep.shards_per_building + '</span>' : '';
        html += '<tr class="row-output">';
        html += '<td class="item-col">' + outputStep.item + '</td>';
        html += '<td class="rate-col">' + outRate.toFixed(1) + '/m</td>';
        html += '<td class="rate-col">' + (outRate * mm.copies).toFixed(1) + '/m</td>';
        html += '<td class="recipe-col">' + outputStep.recipe + '</td>';
        html += '<td class="building-col">' + outputStep.building + ' \u00d7' + outputStep.buildings_ceil + shardHtml + '</td>';
        html += '<td class="rate-col">' + ratePerBldg.toFixed(1) + '/m</td>';
        html += '</tr>';
      }

      html += '</tbody></table>';
      html += '</div>';
      html += '</div>'; // end mini-module
    }

    // === STAGE 1 ===
    var s1 = fac.stage1;
    html += '<div class="stage-header">\u25B6 Stage 1 \u2014 Raw Resources \u2192 Basic Intermediates (' + s1.total_buildings + ' buildings)</div>';

    html += '<div style="padding:12px 20px">';
    html += '<table class="stage1-table"><thead><tr>';
    html += '<th>Product</th><th>Demand</th><th>Steps</th><th>Buildings</th>';
    html += '</tr></thead><tbody>';
    for (var j = 0; j < s1.modules.length; j++) {
      var pm = s1.modules[j];
      var pColor = S1_COLORS[pm.product] || '#ccc';
      var stepInfo = pm.steps.map(function(st) { return st.buildings_ceil + '\u00d7 ' + st.building; }).join(', ');
      html += '<tr>';
      html += '<td style="color:' + pColor + ';font-weight:bold">' + pm.product + '</td>';
      html += '<td>' + pm.demand.toFixed(0) + '/min</td>';
      html += '<td style="color:#888">' + stepInfo + '</td>';
      html += '<td>' + pm.total_buildings + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    html += '</div>';

    // Raw resources summary
    html += '<div class="stage1-summary">';
    html += '<strong>Raw Resources (all ' + fac.num_manufacturers + ' copies):</strong>';
    html += '<div class="raw-list">';
    for (var rr in s1.raw_resources) {
      var rc = RESOURCE_COLORS_MAP[rr] || '#888';
      var belts = Math.ceil(s1.raw_resources[rr] / 780);
      html += '<span class="raw-pill"><span class="dot" style="background:' + rc + '"></span>' + rr + ' ' + s1.raw_resources[rr].toFixed(0);
      if (belts > 1) html += '<span class="belt-count"> (' + belts + ' belts)</span>';
      html += '/min</span>';
    }
    html += '</div>';
    html += '</div>';

    html += '</div>'; // end factory card
  }

  el.innerHTML = html;
}

let OCC_NODES = [];           // normalized occupied-node records

// reuseSet: ids of nodes marked REUSE-ELIGIBLE. Persisted to localStorage.
const REUSE_LS_KEY = 'occ-reuse-nodes';
let reuseSet = new Set();
(function restoreReuse() {
  try {
    const raw = localStorage.getItem(REUSE_LS_KEY);
    if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr)) reuseSet = new Set(arr); }
  } catch (e) { /* ignore corrupt storage */ }
})();
function saveReuse() {
  try { localStorage.setItem(REUSE_LS_KEY, JSON.stringify(Array.from(reuseSet))); }
  catch (e) { /* ignore quota/availability errors */ }
}
function isReuse(id) { return reuseSet.has(id); }
function setReuse(id, on) {
  const had = reuseSet.has(id);
  if (on && !had) reuseSet.add(id);
  else if (!on && had) reuseSet.delete(id);
  else return;                       // no change
  saveReuse();
  draw();
  updateOccCount();
  if (occTabBuilt) syncOccRow(id);
}
function toggleReuse(id) { setReuse(id, !reuseSet.has(id)); }

function loadOccupied() {
  fetch('planner-export/occupied-nodes.json')
    .then(r => r.json())
    .then(data => {
      OCC_NODES = (Array.isArray(data) ? data : []).map(rec => {
        const pos = rec.node_pos || [];
        const x = pos[0], y = pos[1];
        return {
          id: rec.node || (x + ',' + y),
          x: x, y: y,
          t: OCC_RESOURCE_TYPE[rec.resource] || null,
          p: OCC_PURITY_LETTER[rec.purity] || 'n',
          resource: rec.resource || 'Unknown',
          miner: rec.miner_type || ''
        };
      }).filter(n => typeof n.x === 'number' && typeof n.y === 'number');
      occLoaded = true;
      draw();
      if (currentTab === 'occupied') buildOccupiedTab();
    })
    .catch(e => { console.error('Failed to load occupied-nodes.json:', e); });
}

// === OCCUPIED NODES TAB UI ===
function occReuseCount() {
  let n = 0;
  for (const node of OCC_NODES) if (reuseSet.has(node.id)) n++;
  return n;
}
function updateOccCount() {
  const n = occReuseCount(), tot = OCC_NODES.length;
  const el = document.getElementById('occ-count');
  if (el) el.textContent = '(' + n + ' of ' + tot + ' marked reuse-eligible)';
  const pc = document.getElementById('picker-count');
  if (pc) pc.textContent = n;
  const pt = document.getElementById('picker-total');
  if (pt) pt.textContent = tot;
}
function occRowId(id) { return 'occ-row-' + encodeURIComponent(id); }
// Reflect a single node's state into its tab row + the header count.
function syncOccRow(id) {
  const row = document.getElementById(occRowId(id));
  if (row) {
    const on = isReuse(id);
    const cb = row.querySelector('input[type=checkbox]');
    if (cb) cb.checked = on;
    row.classList.toggle('is-reuse', on);
  }
  updateOccCount();
}
function buildOccupiedTab() {
  const header = document.getElementById('occupied-header');
  const list = document.getElementById('occupied-list');
  if (!header || !list) return;

  header.innerHTML =
    '<h2>Occupied Nodes — Reuse Picker</h2>' +
    '<div class="occ-count" id="occ-count"></div>' +
    '<div class="occ-actions">' +
      '<button class="occ-btn" onclick="suggestRemovedFactoryNodes()">Suggest 21 removed-factory nodes</button>' +
      '<button class="occ-btn secondary" onclick="clearAllReuse()">Clear all</button>' +
      '<button class="occ-btn" onclick="exportReuseSelection()">Export reuse selection</button>' +
    '</div>';

  if (!occLoaded) {
    list.innerHTML = '<p style="color:#888;padding-top:16px">Loading occupied-nodes.json…</p>';
    occTabBuilt = true;
    updateOccCount();
    return;
  }

  // Group by resource, sorted by group size desc then name.
  const groups = {};
  for (const node of OCC_NODES) {
    (groups[node.resource] = groups[node.resource] || []).push(node);
  }
  const resourceNames = Object.keys(groups).sort((a, b) =>
    groups[b].length - groups[a].length || a.localeCompare(b));

  let html = '';
  for (const res of resourceNames) {
    const nodes = groups[res];
    const sample = nodes[0];
    const icon = (sample.t && ICON_SVG[RES_ALIAS[sample.t] || sample.t]) || '';
    html += '<div class="occ-group-head">' +
      '<span class="ic">' + icon + '</span>' + res +
      ' <span class="occ-grp-count">(' + nodes.length + ')</span></div>';
    for (const node of nodes) {
      const on = isReuse(node.id);
      const nIcon = (node.t && ICON_SVG[RES_ALIAS[node.t] || node.t]) || '';
      const purity = OCC_PURITY_WORD[node.p] || 'Normal';
      const label = purity + ' ' + (node.t || node.resource) + ' — (' +
        fmtK(node.x) + ', ' + fmtK(node.y) + ')';
      html += '<label class="occ-row' + (on ? ' is-reuse' : '') + '" id="' + occRowId(node.id) + '">' +
        '<input type="checkbox"' + (on ? ' checked' : '') +
          ' onchange="setReuse(\'' + occJsEsc(node.id) + '\', this.checked)">' +
        '<span class="ic">' + nIcon + '</span>' +
        '<span class="occ-label">' + label + '</span>' +
        '<span class="occ-miner">' + (node.miner || '') + '</span>' +
      '</label>';
    }
  }
  list.innerHTML = html;
  occTabBuilt = true;
  updateOccCount();
}
// Compact coordinate like "123k" / "-45k".
function fmtK(v) {
  const k = v / 1000;
  return (Math.round(k * 10) / 10) + 'k';
}
// Escape a node id for safe inline-handler single-quoted string use.
function occJsEsc(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

function suggestRemovedFactoryNodes() {
  const R = 5000;
  for (const node of OCC_NODES) {
    let near = false;
    for (const [px, py] of REMOVED_FACTORY_NODES) {
      const dx = node.x - px, dy = node.y - py;
      if (dx * dx + dy * dy <= R * R) { near = true; break; }
    }
    if (near && !reuseSet.has(node.id)) reuseSet.add(node.id);
  }
  saveReuse();
  draw();
  updateOccCount();
  if (occTabBuilt) buildOccupiedTab();
}
function clearAllReuse() {
  let changed = false;
  for (const node of OCC_NODES) { if (reuseSet.delete(node.id)) changed = true; }
  if (changed) saveReuse();
  draw();
  updateOccCount();
  if (occTabBuilt) buildOccupiedTab();
}
function exportReuseSelection() {
  const out = [];
  for (const node of OCC_NODES) {
    if (!reuseSet.has(node.id)) continue;
    out.push({
      id: node.id, x: node.x, y: node.y,
      type: node.t, purity: OCC_PURITY_WORD[node.p] || 'Normal',
      resource: node.resource
    });
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'reuse-nodes.json';
  a.click();
  URL.revokeObjectURL(url);
}
