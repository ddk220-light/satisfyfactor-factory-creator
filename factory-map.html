const MAP_CY = (MAP_MIN_Y + MAP_MAX_Y) / 2;

let viewX = MAP_CX, viewY = MAP_CY;
let zoom = 0.001; // will be set on init
let dragging = false, dragStartX = 0, dragStartY = 0, dragViewX = 0, dragViewY = 0;
let dragMoved = false; // true once a mousedown turns into a real pan; suppresses the trailing click
let W = 800, H = 600;

let visible = {};
for (const fid of Object.keys(FACTORIES)) { visible[fid] = true; }
let townVisible = {};
for (const mt of MINING_TOWNS) { townVisible[mt.id] = true; }
let gapVisible = {};
for (const gf of GAP_FACTORIES) { gapVisible[gf.id] = true; }
let gapTownVisible = {};
for (const gt of (typeof GAP_TOWNS !== 'undefined' ? GAP_TOWNS : [])) { gapTownVisible[gt.id] = true; }

// === TRANSFORM ===
function g2s(gx, gy) {
  return {
    x: (gx - viewX) * zoom + W / 2,
    y: (gy - viewY) * zoom + H / 2,
  };
}
function s2g(sx, sy) {
  return {
    x: (sx - W / 2) / zoom + viewX,
    y: (sy - H / 2) / zoom + viewY,
  };
}

// === ICON RASTER CACHE ===
const ICON_IMG = new Map();   // key -> HTMLImageElement | null
function getIconImage(name) {
  const key = RES_ALIAS[name] || name;
  if (ICON_IMG.has(key)) return ICON_IMG.get(key);
  const svg = ICON_SVG[key];
  if (!svg) { ICON_IMG.set(key, null); return null; }
  const img = new Image();
  img.onload = () => { draw(); };           // repaint once this icon is ready
  img.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
  ICON_IMG.set(key, img);
  return img;
}
// Draw an icon centered at (sx,sy). Returns false if not ready (caller draws fallback).
function drawIcon(name, sx, sy, size, alpha) {
  const img = getIconImage(name);
  if (img && img.complete && img.naturalWidth) {
    ctx.globalAlpha = (alpha == null) ? 1 : alpha;
    ctx.drawImage(img, sx - size / 2, sy - size / 2, size, size);
    ctx.globalAlpha = 1;
    return true;
  }
  return false;
}

// ===================================================================
// SHARED SIZING MODEL + HOVER STATE + LABEL PILL HELPER
// ===================================================================

// --- Hover tracking: which marker/node the cursor is over -----------
// hoverKey is a stable string id for the hovered element; any draw*
// routine compares its own element key against it to apply HOVER_MUL.
let hoverKey = null;

// --- Core zoom -> scale curve ---------------------------------------
// Returns a multiplier that is MARKER_SCALE_MIN at/under ZOOM_FIT and
// rises (sub-linearly) toward MARKER_SCALE_MAX at/over ZOOM_FULL.
function markerScale() {
  const t = (Math.log(zoom) - Math.log(ZOOM_FIT)) /
            (Math.log(ZOOM_FULL) - Math.log(ZOOM_FIT));
  const c = Math.max(0, Math.min(1, t));
  const eased = Math.pow(c, MARKER_SCALE_EXP);
  return MARKER_SCALE_MIN + (MARKER_SCALE_MAX - MARKER_SCALE_MIN) * eased;
}

// Same curve, slightly wider range, for resource-node icons. Takes the
// node purity so impure/normal/pure still differ in size as before.
function nodeIconSize(purity) {
  const t = (Math.log(zoom) - Math.log(ZOOM_FIT)) /
            (Math.log(ZOOM_FULL) - Math.log(ZOOM_FIT));
  const c = Math.max(0, Math.min(1, t));
  const eased = Math.pow(c, MARKER_SCALE_EXP);
  const s = NODE_SCALE_MIN + (NODE_SCALE_MAX - NODE_SCALE_MIN) * eased;
  const ps = (PURITY_SCALE[purity] != null) ? PURITY_SCALE[purity] : 1;
  // baseR: the per-node radius unit the old code used (4 * purityScale).
  return 4 * ps * s;
}

// Convenience: label font size that tracks the same curve, clamped.
function labelFont(base, min, max) {
  return Math.max(min, Math.min(max, Math.round(base * markerScale())));
}

// --- Label pill: rounded translucent plate behind text --------------
function roundRect(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y,     x + w, y + h, r);
  c.arcTo(x + w, y + h, x,     y + h, r);
  c.arcTo(x,     y + h, x,     y,     r);
  c.arcTo(x,     y,     x + w, y,     r);
  c.closePath();
}
// Draw `text` centered at (cx, cy) with a pill behind it.
function drawLabelPill(text, cx, cy, fillColor) {
  const m = ctx.measureText(text);
  const padX = 6, padY = 3;
  const fsMatch = /(\d+(?:\.\d+)?)px/.exec(ctx.font);
  const fs = fsMatch ? parseFloat(fsMatch[1]) : 12;
  const w = m.width + padX * 2;
  const h = fs + padY * 2;
  const prevAlign = ctx.textAlign;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(10,14,22,0.72)';
  roundRect(ctx, cx - w / 2, cy - h / 2, w, h, h / 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = fillColor;
  ctx.fillText(text, cx, cy + fs * 0.34);
  ctx.textAlign = prevAlign;
  ctx.globalAlpha = 1;
}

// --- Dark halo behind a resource-node icon --------------------------
function drawNodeHalo(sx, sy, iconSize) {
  ctx.globalAlpha = 0.45;
  ctx.fillStyle = '#0a0e16';
  ctx.beginPath();
  ctx.arc(sx, sy, iconSize * 0.62, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// --- Cursor-anchored zoom step (shared by buttons / keys / dblclick) -
function zoomAtScreen(factor, sx, sy) {
  if (sx == null) sx = W / 2;
  if (sy == null) sy = H / 2;
  const mg = s2g(sx, sy);
  zoom = Math.max(0.0003, Math.min(0.05, zoom * factor));
  viewX = mg.x - (sx - W / 2) / zoom;
  viewY = mg.y - (sy - H / 2) / zoom;
  updateZoomReadout();
  draw();
}

// --- Zoom readout text refresh (HUD created in uxChanges) -----------
function updateZoomReadout() {
  const el = document.getElementById('zoom-readout');
  if (el) el.textContent = Math.round(zoom / ZOOM_FIT * 100) + '%';
}

let componentFilter = 'all';   // active component dropdown value ('all' = no filter)
function setComponentFilter(v) { componentFilter = v; draw(); }
function setShowOccupied(on) { showOccupied = on; draw(); }
function populateComponentFilter() {
  const sel = document.getElementById('componentFilter');
  if (!sel) return;
  for (const name of Object.keys(COMPONENT_META).sort()) {
    const o = document.createElement('option');
    o.value = name; o.textContent = name;
    sel.appendChild(o);
  }
}
function factoryProducts(prod) {
  return (prod || []).map(p => (typeof p === 'string') ? p : p.item);
}
function gapEligible(gf) {
  return componentFilter === 'all' || factoryProducts(gf.prod).includes(componentFilter);
}
function baseEligible(fid) {
  return componentFilter === 'all' || (BASE_FACTORY_PROD[fid] || []).includes(componentFilter);
}

// === DRAWING ===
function draw() {
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  drawMapBackground();
  drawGrid();

  // Background resource nodes (faint)
  if (zoom > ZOOM_SHOW_BG_NODES) {
    drawBackgroundNodes();
  }

  // Factory data
  const filterActive = componentFilter !== 'all';
  const fids = Object.keys(FACTORIES);
  for (const fid of fids) {
    if (!visible[fid] || !baseEligible(fid)) continue;
    const f = FACTORIES[fid];

    drawBaseFootprint(fid, f);
    if (zoom > ZOOM_SHOW_FACTORY_NODES) drawFactoryNodes(fid, f);
  }

  // Mining towns (hidden while a component filter is active)
  for (const mt of MINING_TOWNS) {
    if (filterActive || !townVisible[mt.id]) continue;
    if (zoom > ZOOM_SHOW_RADIUS) drawSearchRadius_mt(mt);
    if (zoom > ZOOM_SHOW_LINES) drawConnections_mt(mt);
    if (zoom > ZOOM_SHOW_FACTORY_NODES) drawTownNodes(mt);
  }

  // Gap supply-chain factories — footprint boundary first (behind the nodes)
  for (const gf of GAP_FACTORIES) {
    if (!gapVisible[gf.id] || !gapEligible(gf)) continue;
    drawGapFootprint(gf);
  }
  for (const gf of GAP_FACTORIES) {
    if (!gapVisible[gf.id] || !gapEligible(gf)) continue;
    if (zoom > ZOOM_SHOW_FACTORY_NODES) drawGapNodes(gf);
  }

  // Town -> factory supply arrows (under the markers, above footprints)
  drawTownSupplyArrows();

  // Factory centers always on top
  for (const fid of fids) {
    if (!visible[fid] || !baseEligible(fid)) continue;
    const f = FACTORIES[fid];
    drawFactoryCenter(fid, f);
  }

  // Mining town centers on top
  for (const mt of MINING_TOWNS) {
    if (filterActive || !townVisible[mt.id]) continue;
    drawTownCenter(mt);
  }

  // Gap factory centers on top
  for (const gf of GAP_FACTORIES) {
    if (!gapVisible[gf.id] || !gapEligible(gf)) continue;
    drawGapCenter(gf);
  }

  // Gap mining towns (hidden while a component filter is active)
  if (typeof GAP_TOWNS !== 'undefined' && !filterActive) {
    for (const gt of GAP_TOWNS) {
      if (!gapTownVisible[gt.id]) continue;
      drawGapTown(gt);
    }
  }

  // Occupied-node reuse overlay (always topmost so markers stay clickable).
  // In picker mode, dim everything below first so the live nodes are the focus.
  if ((showOccupied || pickerMode) && occLoaded && OCC_NODES.length) {
    if (pickerMode) {
      ctx.fillStyle = 'rgba(13,17,23,0.55)';
      ctx.fillRect(0, 0, W, H);
    }
    drawOccupiedNodes();
  }
}

// === OCCUPIED NODE OVERLAY ===
function drawOccupiedNodes() {
  const tlg = s2g(0, 0);
  const brg = s2g(W, H);
  const ms = markerScale();
  for (const node of OCC_NODES) {
    // Frustum cull (same pattern as drawBackgroundNodes)
    if (node.x < tlg.x - 5000 || node.x > brg.x + 5000) continue;
    if (node.y < tlg.y - 5000 || node.y > brg.y + 5000) continue;
    const s = g2s(node.x, node.y);
    const reuse = isReuse(node.id);
    const hov = (hoverKey === ('occ:' + node.id)) ? HOVER_MUL : 1;
    // Minimum 7px ring so every live node is visible even at full overview.
    const r = Math.max(7, nodeIconSize(node.p) / 2 + 3) * hov;
    const color = reuse ? '#2ecc71' : '#f39c12';   // green=reuse, amber=leave-alone

    // Dark halo + resource glyph (so each node reads against the dimmed map).
    drawNodeHalo(s.x, s.y, r * 2.3);
    if (zoom > ZOOM_SHOW_FACTORY_NODES && node.t) {
      drawIcon(node.t, s.x, s.y, r * 2.1, reuse ? 0.95 : 0.8);
    }
    // Colored glow + solid ring — bold for both states so they're easy to spot.
    ctx.fillStyle = color + '22';
    ctx.beginPath(); ctx.arc(s.x, s.y, r + 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = reuse ? 3 : 2.4;
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.stroke();

    // Badge top-right: green check (reuse) or amber dot (leave-alone).
    const bx = s.x + r * 0.78, by = s.y - r * 0.78, cs = Math.max(3.5, r * 0.55);
    if (reuse) {
      ctx.strokeStyle = '#0d1117'; ctx.lineWidth = Math.max(3, cs * 0.9);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(bx - cs * 0.5, by); ctx.lineTo(bx - cs * 0.1, by + cs * 0.4);
      ctx.lineTo(bx + cs * 0.55, by - cs * 0.45); ctx.stroke();   // dark outline
      ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = Math.max(1.6, cs * 0.5);
      ctx.beginPath();
      ctx.moveTo(bx - cs * 0.5, by); ctx.lineTo(bx - cs * 0.1, by + cs * 0.4);
      ctx.lineTo(bx + cs * 0.55, by - cs * 0.45); ctx.stroke();
      ctx.lineCap = 'butt'; ctx.lineJoin = 'miter';
    } else {
      ctx.fillStyle = '#f39c12';
      ctx.beginPath(); ctx.arc(bx, by, Math.max(2, cs * 0.45), 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#0d1117'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(bx, by, Math.max(2, cs * 0.45), 0, Math.PI * 2); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'miter';
}

function drawMapBackground() {
  if (!mapImgLoaded) return;
  const tl = g2s(IMG_MIN_X, IMG_MIN_Y);
  const screenW = IMG_GAME_W * zoom;
  const screenH = IMG_GAME_H * zoom;
  ctx.drawImage(MAP_IMG, tl.x, tl.y, screenW, screenH);
}

function drawGrid() {
  // Draw faint grid lines at 100k game unit intervals (1km)
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  const step = 100000;
  const tlg = s2g(0, 0);
  const brg = s2g(W, H);
  const startX = Math.floor(tlg.x / step) * step;
  const startY = Math.floor(tlg.y / step) * step;
  ctx.beginPath();
  for (let gx = startX; gx <= brg.x; gx += step) {
    const s = g2s(gx, 0);
    ctx.moveTo(s.x, 0);
    ctx.lineTo(s.x, H);
  }
  for (let gy = startY; gy <= brg.y; gy += step) {
    const s = g2s(0, gy);
    ctx.moveTo(0, s.y);
    ctx.lineTo(W, s.y);
  }
  ctx.stroke();
}

function drawBackgroundNodes() {
  const tlg = s2g(0, 0);
  const brg = s2g(W, H);
  for (const n of ALL_NODES) {
    // Frustum cull
    if (n.x < tlg.x - 5000 || n.x > brg.x + 5000) continue;
    if (n.y < tlg.y - 5000 || n.y > brg.y + 5000) continue;
    const s = g2s(n.x, n.y);
    // Background icons read at ~0.65 of a full node-icon so they stay faint
    // but now GROW with zoom via nodeIconSize().
    const hov = (hoverKey === ('bg:' + n.x + ',' + n.y)) ? HOVER_MUL : 1;
    const size = nodeIconSize(n.p) * 0.65 * hov;
    drawNodeHalo(s.x, s.y, size * 0.85);
    if (!drawIcon(n.t, s.x, s.y, size, 0.4 * PURITY_ALPHA[n.p])) {
      ctx.globalAlpha = 0.15 * PURITY_ALPHA[n.p];
      ctx.fillStyle = RESOURCE_COLORS[n.t] || '#666';
      ctx.beginPath();
      ctx.arc(s.x, s.y, size * 0.33, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawSearchRadius(fid, f) {
  const s = g2s(f.cx, f.cy);
  const r = SEARCH_RADIUS * zoom;
  ctx.strokeStyle = FACTORY_COLORS[fid] + '30';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawConnections(fid, f) {
  const sc = g2s(f.cx, f.cy);
  ctx.strokeStyle = FACTORY_COLORS[fid] + '40';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (const n of f.nodes) {
    const sn = g2s(n.x, n.y);
    ctx.moveTo(sc.x, sc.y);
    ctx.lineTo(sn.x, sn.y);
  }
  ctx.stroke();
}

function drawFactoryNodes(fid, f) {
  const color = FACTORY_COLORS[fid];
  // Hovering anywhere on the factory enlarges ALL its input nodes.
  const fhov = baseHovered(fid) ? FAC_NODE_HOVER : 1;
  for (const n of f.nodes) {
    const s = g2s(n.x, n.y);
    const hov = Math.max(fhov, (hoverKey === ('fn:' + fid + ':' + n.x + ',' + n.y)) ? HOVER_MUL : 1);
    const baseR = nodeIconSize(n.p) / 2 * hov;   // half of icon size = ring radius unit
    const iconSize = baseR * 2.6;

    // Dark halo so the icon reads on the bright map
    drawNodeHalo(s.x, s.y, iconSize);

    // Ring in factory color
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(s.x, s.y, baseR + 2, 0, Math.PI * 2);
    ctx.stroke();

    // Resource icon (dot fallback until loaded)
    if (!drawIcon(n.t, s.x, s.y, iconSize, PURITY_ALPHA[n.p])) {
      ctx.globalAlpha = PURITY_ALPHA[n.p];
      ctx.fillStyle = RESOURCE_COLORS[n.t] || '#666';
      ctx.beginPath();
      ctx.arc(s.x, s.y, baseR, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Purity + type label at high zoom
    if (zoom > ZOOM_SHOW_PURITY_TEXT) {
      const fs = labelFont(9, 9, 16);
      ctx.font = fs + 'px Courier New';
      const label = PURITY_LABEL[n.p] + ' ' + n.t;
      ctx.textAlign = 'left';
      const m = ctx.measureText(label);
      const lx = s.x + baseR + 4, ly = s.y + 3;
      ctx.fillStyle = 'rgba(10,14,22,0.72)';
      roundRect(ctx, lx - 4, ly - fs, m.width + 8, fs + 6, (fs + 6) / 2);
      ctx.fill();
      ctx.fillStyle = '#ddd';
      ctx.fillText(label, lx, ly);
    }
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawFactoryCenter(fid, f) {
  const s = g2s(f.cx, f.cy);
  const color = FACTORY_COLORS[fid];
  const hov = (hoverKey === ('fc:' + fid)) ? HOVER_MUL : 1;
  const r = Math.max(8, Math.round(11 * markerScale())) * hov;

  // (blue disc removed per user — keep just the name label + product icons)
  // Label (translucent pill behind text instead of bare stroke)
  const fs = labelFont(12, 12, 30);
  ctx.font = `bold ${fs}px Courier New`;
  ctx.textAlign = 'center';
  drawLabelPill(f.name, s.x, s.y - r - 8 - fs * 0.5, '#fff');
  ctx.textAlign = 'left';
  drawProductIcons(s.x, s.y, BASE_FACTORY_PROD[fid], r);
}

// === GAP FACTORY DRAWING ===
// === FOOTPRINT BOUNDARY (convex hull around a factory/town's nodes) ===
function convexHull(pts) {
  if (pts.length < 3) return pts.slice();
  const p = pts.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  const lo = [];
  for (const q of p) { while (lo.length >= 2 && cross(lo[lo.length - 2], lo[lo.length - 1], q) <= 0) lo.pop(); lo.push(q); }
  const up = [];
  for (let i = p.length - 1; i >= 0; i--) { const q = p[i]; while (up.length >= 2 && cross(up[up.length - 2], up[up.length - 1], q) <= 0) up.pop(); up.push(q); }
  lo.pop(); up.pop(); return lo.concat(up);
}
// Hex (#rgb or #rrggbb) -> rgba() with alpha. Robust vs 3-digit colors like coal '#555'.
function withAlpha(hex, a) {
  let h = (hex || '#888888').replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  const n = parseInt(h, 16) || 0;
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}
// Boundary encompassing `nodes` (game coords), padded marginPx beyond them in
// screen space; faint fill + optional dotted stroke. Restores ctx state.
function drawNodeBoundary(nodes, marginPx, fillStyle, strokeStyle, lineWidth, dash) {
  if (!nodes || !nodes.length) return;
  const sp = nodes.map(n => g2s(n.x, n.y));
  const cx = sp.reduce((s, p) => s + p.x, 0) / sp.length;
  const cy = sp.reduce((s, p) => s + p.y, 0) / sp.length;
  const hull = convexHull(sp).map(p => {
    const dx = p.x - cx, dy = p.y - cy, d = Math.hypot(dx, dy) || 1;
    return { x: p.x + dx / d * marginPx, y: p.y + dy / d * marginPx };
  });
  ctx.save();
  ctx.beginPath();
  if (hull.length < 3) {
    if (sp.length === 1) {
      ctx.arc(sp[0].x, sp[0].y, marginPx, 0, Math.PI * 2);
    } else {
      // collinear / 2-node: tight corridor between the two farthest points
      let a = sp[0], b = sp[1], best = -1;
      for (let i = 0; i < sp.length; i++) for (let j = i + 1; j < sp.length; j++) {
        const d = Math.hypot(sp[i].x - sp[j].x, sp[i].y - sp[j].y);
        if (d > best) { best = d; a = sp[i]; b = sp[j]; }
      }
      const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
      const ux = dx / len, uy = dy / len, nx = -uy * marginPx, ny = ux * marginPx;
      const A = { x: a.x - ux * marginPx, y: a.y - uy * marginPx };
      const B = { x: b.x + ux * marginPx, y: b.y + uy * marginPx };
      ctx.moveTo(A.x + nx, A.y + ny); ctx.lineTo(B.x + nx, B.y + ny);
      ctx.lineTo(B.x - nx, B.y - ny); ctx.lineTo(A.x - nx, A.y - ny);
      ctx.closePath();
    }
  } else {
    hull.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath();
  }
  if (fillStyle) { ctx.fillStyle = fillStyle; ctx.fill(); }
  if (strokeStyle) {
    ctx.setLineDash(dash || []);
    ctx.strokeStyle = strokeStyle; ctx.lineWidth = lineWidth || 1.5;
    ctx.lineJoin = 'round'; ctx.stroke();
  }
  ctx.restore();
}
function gapAllNodes(gf) {
  const out = [];
  for (const st of (gf.sites || [])) for (const n of (st.nodes || [])) out.push(n);
  for (const o of (gf.outposts || [])) for (const n of (o.nodes || [])) out.push(n);
  return out;
}
// Is the cursor over this factory (its marker or any of its nodes)?
function gapHovered(gf) {
  return !!hoverKey && (hoverKey.indexOf('gc:' + gf.id + ':') === 0
    || hoverKey.indexOf('gn:' + gf.id + ':') === 0
    || hoverKey.indexOf('go:' + gf.id + ':') === 0);
}
function baseHovered(fid) {
  return !!hoverKey && (hoverKey === 'fc:' + fid || hoverKey.indexOf('fn:' + fid + ':') === 0);
}
// Clusters whose center is farther than this from the factory's home are
// treated as railway-linked (dotted line) rather than part of the local area.
const RAIL_DIST = 90000;   // 900 m
function drawGapFootprint(gf) {
  const hov = gapHovered(gf);
  if (!hov && zoom <= ZOOM_SHOW_FACTORY_NODES) return;   // hover reveals it even at overview
  const color = GAP_COLORS[gf.disp] || '#2ecc71';
  const sites = gf.sites || [];
  if (!sites.length) return;
  const home = { x: sites[0].x, y: sites[0].y };
  // Split clusters (sites + outposts) into local (near home) vs remote (rail).
  const clusters = sites.map(s => ({ x: s.x, y: s.y, nodes: s.nodes || [] }))
    .concat((gf.outposts || []).map(o => ({ x: o.x, y: o.y, nodes: o.nodes || [] })));
  const localNodes = [];
  const remote = [];
  for (const c of clusters) {
    if (Math.hypot(c.x - home.x, c.y - home.y) > RAIL_DIST) remote.push(c);
    else localNodes.push(...c.nodes);
  }
  // Railway links to remote clusters (dotted lines from the factory home).
  if (remote.length) {
    const hs = g2s(home.x, home.y);
    ctx.save();
    ctx.strokeStyle = withAlpha(color, hov ? 0.95 : 0.5);
    ctx.lineWidth = hov ? 2 : 1.2;
    ctx.setLineDash([2, 5]); ctx.lineCap = 'round';
    for (const c of remote) {
      const cs = g2s(c.x, c.y);
      ctx.beginPath(); ctx.moveTo(hs.x, hs.y); ctx.lineTo(cs.x, cs.y); ctx.stroke();
    }
    ctx.restore();
  }
  // Local area = hull of the close-by nodes only (no more map-spanning shapes).
  drawNodeBoundary(localNodes, 26, withAlpha(color, hov ? 0.32 : 0.08),
    withAlpha(color, hov ? 1 : 0.7), hov ? 2.6 : 1.6, [7, 5]);
}
function drawBaseFootprint(fid, f) {
  const hov = baseHovered(fid);
  if (!hov && zoom <= ZOOM_SHOW_FACTORY_NODES) return;
  const color = FACTORY_COLORS[fid] || '#3498db';
  drawNodeBoundary(f.nodes || [], 26,
    withAlpha(color, hov ? 0.32 : 0.08), withAlpha(color, hov ? 1 : 0.7),
    hov ? 2.6 : 1.6, [7, 5]);
}

function drawGapNodes(gf) {
  const color = GAP_COLORS[gf.disp] || '#2ecc71';
  // Hovering anywhere on the factory enlarges ALL its input nodes.
  const fhov = gapHovered(gf) ? FAC_NODE_HOVER : 1;
  (gf.sites || []).forEach((site, si) => {
    for (const n of (site.nodes || [])) {
      const s = g2s(n.x, n.y);
      const hov = Math.max(fhov, (hoverKey === ('gn:' + gf.id + ':' + n.x + ',' + n.y)) ? HOVER_MUL : 1);
      const baseR = nodeIconSize(n.p) / 2 * hov;
      const iconSize = baseR * 2.6;
      drawNodeHalo(s.x, s.y, iconSize);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.setLineDash(si === 0 ? [] : [3, 2]);   // satellites dashed
      ctx.beginPath(); ctx.arc(s.x, s.y, baseR + 2, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
      if (!drawIcon(n.t, s.x, s.y, iconSize, PURITY_ALPHA[n.p] || 0.7)) {
        ctx.globalAlpha = PURITY_ALPHA[n.p] || 0.7;
        ctx.fillStyle = RESOURCE_COLORS[n.t] || '#666';
        ctx.beginPath(); ctx.arc(s.x, s.y, baseR, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  });
  // outposts: resource icon with gap-colored outline (was small diamonds)
  for (const o of (gf.outposts || [])) {
    for (const n of (o.nodes || [])) {
      const s = g2s(n.x, n.y);
      const hov = Math.max(fhov, (hoverKey === ('go:' + gf.id + ':' + n.x + ',' + n.y)) ? HOVER_MUL : 1);
      // outposts are slightly smaller than primary nodes (was 3.5 vs 4)
      const r = nodeIconSize(n.p) / 2 * 0.875 * hov;
      const iconSize = r * 2.4;
      drawNodeHalo(s.x, s.y, iconSize);
      ctx.strokeStyle = color; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(s.x, s.y, r + 2, 0, Math.PI * 2); ctx.stroke();
      if (!drawIcon(n.t, s.x, s.y, iconSize, 0.7)) {
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = RESOURCE_COLORS[n.t] || '#666';
        ctx.beginPath();
        ctx.moveTo(s.x, s.y - r); ctx.lineTo(s.x + r, s.y);
        ctx.lineTo(s.x, s.y + r); ctx.lineTo(s.x - r, s.y);
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
}

function drawGapCenter(gf) {
  const color = GAP_COLORS[gf.disp] || '#2ecc71';
  (gf.sites || []).forEach((site, si) => {
    const s = g2s(site.x, site.y);
    const hov = (hoverKey === ('gc:' + gf.id + ':' + si)) ? HOVER_MUL : 1;
    const r = Math.max(7, Math.round(10 * markerScale())) * hov;
    if (si !== 0) {
      // satellite site: small dashed ring marker only (no big disc)
      ctx.strokeStyle = color; ctx.lineWidth = 1.4; ctx.setLineDash([3, 2]);
      ctx.beginPath(); ctx.arc(s.x, s.y, Math.max(3, r * 0.5), 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
    }
    if (si === 0) {
      const tag = gf.infeasible ? gf.name + ' ⚠' : gf.name;
      const fs = labelFont(12, 11, 30);
      ctx.font = `bold ${fs}px Courier New`;
      ctx.textAlign = 'center';
      drawLabelPill(tag, s.x, s.y - r - 8 - fs * 0.5, gf.infeasible ? '#ff6b6b' : '#fff');
      ctx.textAlign = 'left';
      drawProductIcons(s.x, s.y, gf.prod, r);
    }
  });
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
}

function drawGapTown(gt) {
  if (zoom <= ZOOM_SHOW_FACTORY_NODES) return;   // towns are zoom-in info, not overview markers
  const color = RESOURCE_COLORS[gt.r] || '#aaa';
  // Soft transparent boundary around the town's nodes (a region, not a place).
  drawNodeBoundary(gt.nodes || [], 18, withAlpha(color, 0.07), withAlpha(color, 0.45), 1.1, [4, 3]);
  // Resource nodes — smaller than factory nodes (towns are just information).
  for (const n of (gt.nodes || [])) {
    const s = g2s(n.x, n.y);
    const hov = (hoverKey === ('gtn:' + gt.id + ':' + n.x + ',' + n.y)) ? HOVER_MUL : 1;
    const r = nodeIconSize(n.p) / 2 * 0.78 * hov;
    const iconSize = r * 2.4;
    drawNodeHalo(s.x, s.y, iconSize);
    ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(s.x, s.y, r + 1.5, 0, Math.PI * 2); ctx.stroke();
    if (!drawIcon(n.t || gt.r, s.x, s.y, iconSize, PURITY_ALPHA[n.p] || 0.7)) {
      ctx.globalAlpha = PURITY_ALPHA[n.p] || 0.7;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  // Small, light label at the centroid (smaller than factory labels).
  const s = g2s(gt.cx, gt.cy);
  const fs = labelFont(9, 9, 15);
  ctx.font = `${fs}px Courier New`;
  ctx.textAlign = 'center';
  drawLabelPill(gt.name, s.x, s.y, color);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

// Row of component icons under a factory marker. prodList items: string | {item,amt}.
function drawProductIcons(sx, sy, prodList, r) {
  if (!prodList || !prodList.length) return;
  // Product icons now track the shared marker curve (was sqrt(zoom/0.001)).
  const size = Math.max(13, Math.min(34, Math.round(15 * markerScale())));
  const step = size + 3;
  const totalW = prodList.length * step - 3;
  let x = sx - totalW / 2 + size / 2;
  const y = sy + r + 10 + size / 2;
  const active = componentFilter !== 'all';
  for (const p of prodList) {
    const item = (typeof p === 'string') ? p : p.item;
    const isMatch = item === componentFilter;
    const a = (!active || isMatch) ? 1 : 0.25;
    if (active && isMatch) {
      ctx.strokeStyle = (COMPONENT_META[item] && COMPONENT_META[item].color) || '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, size / 2 + 3, 0, Math.PI * 2); ctx.stroke();
    }
    if (!drawIcon(item, x, y, size, a)) {
      const meta = COMPONENT_META[item] || { code: item.slice(0, 3).toUpperCase(), color: '#888' };
      ctx.globalAlpha = a;
      ctx.fillStyle = meta.color;
      ctx.fillRect(x - size / 2, y - size / 2, size, size);
      ctx.fillStyle = '#1a1a2e';
      ctx.font = `bold ${Math.round(size * 0.4)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText(meta.code, x, y + size * 0.15);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    }
    x += step;
  }
}

// Primary-site center for a factory id (target of a town supply arrow).
function factoryCenterById(id) {
  if (typeof GAP_FACTORIES !== 'undefined') {
    const gf = GAP_FACTORIES.find(g => g.id === id);
    if (gf && gf.sites && gf.sites.length) return { x: gf.sites[0].x, y: gf.sites[0].y };
  }
  if (typeof FACTORIES !== 'undefined' && FACTORIES[id]) return { x: FACTORIES[id].cx, y: FACTORIES[id].cy };
  return null;
}

// Arrow from (ax,ay)->(bx,by) in screen coords; stops short of the target and
// caps with a filled arrowhead.
function drawArrow(ax, ay, bx, by, style, width, dash) {
  const dx = bx - ax, dy = by - ay, len = Math.hypot(dx, dy) || 1;
  if (len < 18) return;
  const ux = dx / len, uy = dy / len, gap = 13;
  const ex = bx - ux * gap, ey = by - uy * gap;
  ctx.save();
  ctx.strokeStyle = style; ctx.fillStyle = style; ctx.lineWidth = width;
  ctx.setLineDash(dash || []);
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ex, ey); ctx.stroke();
  ctx.setLineDash([]);
  const ah = Math.max(6, width * 3.2), ang = Math.atan2(ey - ay, ex - ax);
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - ah * Math.cos(ang - 0.42), ey - ah * Math.sin(ang - 0.42));
  ctx.lineTo(ex - ah * Math.cos(ang + 0.42), ey - ah * Math.sin(ang + 0.42));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// Supply lines: an arrow from each gap mining town to every factory it feeds.
// Faint by default; bold when that town OR a fed factory is hovered. Shown once
// zoomed in past the connection-line threshold.
function drawTownSupplyArrows() {
  if (typeof GAP_TOWNS === 'undefined' || componentFilter !== 'all') return;
  if (zoom <= ZOOM_SHOW_LINES) return;
  for (const gt of GAP_TOWNS) {
    if (!gapTownVisible[gt.id]) continue;
    const townHov = hoverKey === ('gt:' + gt.id);
    const color = RESOURCE_COLORS[gt.r] || '#9fb0c8';
    const ts = g2s(gt.cx, gt.cy);
    for (const sup of (gt.supplies || [])) {
      if (typeof gapVisible !== 'undefined' && gapVisible[sup.factory] === false) continue;
      const fc = factoryCenterById(sup.factory);
      if (!fc) continue;
      const facHov = !!hoverKey && hoverKey.indexOf('gc:' + sup.factory + ':') === 0;
      const on = townHov || facHov;
      const fp = g2s(fc.x, fc.y);
      drawArrow(ts.x, ts.y, fp.x, fp.y,
                withAlpha(color, on ? 0.9 : 0.18), on ? 2.4 : 1.1, [6, 5]);
    }
  }
}

// === MINING TOWN DRAWING ===
function drawSearchRadius_mt(mt) {
  const s = g2s(mt.cx, mt.cy);
  const r = SEARCH_RADIUS * zoom;
  ctx.strokeStyle = mt.color + '30';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawConnections_mt(mt) {
  const sc = g2s(mt.cx, mt.cy);
  ctx.strokeStyle = mt.color + '40';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (const n of mt.nodes) {
    const sn = g2s(n.x, n.y);
    ctx.moveTo(sc.x, sc.y);
    ctx.lineTo(sn.x, sn.y);
  }
  ctx.stroke();
}

function drawTownNodes(mt) {
  for (const n of mt.nodes) {
    const s = g2s(n.x, n.y);
    const hov = (hoverKey === ('tn:' + mt.id + ':' + n.x + ',' + n.y)) ? HOVER_MUL : 1;
    const baseR = nodeIconSize(n.p) / 2 * hov;
    const iconSize = baseR * 2.6;
    drawNodeHalo(s.x, s.y, iconSize);
    ctx.strokeStyle = mt.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(s.x, s.y, baseR + 2, 0, Math.PI * 2);
    ctx.stroke();
    if (!drawIcon(n.t, s.x, s.y, iconSize, PURITY_ALPHA[n.p])) {
      ctx.globalAlpha = PURITY_ALPHA[n.p];
      ctx.fillStyle = RESOURCE_COLORS[n.t] || '#666';
      ctx.beginPath();
      ctx.arc(s.x, s.y, baseR, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    if (zoom > ZOOM_SHOW_PURITY_TEXT) {
      const fs = labelFont(9, 9, 16);
      ctx.font = fs + 'px Courier New';
      const label = PURITY_LABEL[n.p] + ' ' + n.t;
      ctx.textAlign = 'left';
      const m = ctx.measureText(label);
      const lx = s.x + baseR + 4, ly = s.y + 3;
      ctx.fillStyle = 'rgba(10,14,22,0.72)';
      roundRect(ctx, lx - 4, ly - fs, m.width + 8, fs + 6, (fs + 6) / 2);
      ctx.fill();
      ctx.fillStyle = '#ddd';
      ctx.fillText(label, lx, ly);
    }
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawTownCenter(mt) {
  const s = g2s(mt.cx, mt.cy);
  const hov = (hoverKey === ('tc:' + mt.id)) ? HOVER_MUL : 1;
  const r = Math.max(8, Math.round(11 * markerScale())) * hov;

  // Outer glow
  ctx.fillStyle = mt.color + '30';
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(Math.PI / 4);
  ctx.fillRect(-r - 4, -r - 4, (r + 4) * 2, (r + 4) * 2);
  ctx.restore();

  // Diamond shape
  ctx.fillStyle = mt.color;
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(Math.PI / 4);
  ctx.fillRect(-r, -r, r * 2, r * 2);
  ctx.restore();

  // Border
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(Math.PI / 4);
  ctx.strokeRect(-r, -r, r * 2, r * 2);
  ctx.restore();

  // Label (pill-backed)
  const tfs = labelFont(12, 12, 30);
  ctx.font = `bold ${tfs}px Courier New`;
  ctx.textAlign = 'center';
  drawLabelPill(mt.name, s.x, s.y - r - 10 - tfs * 0.5, '#fff');

  // Pickaxe icon text inside
  ctx.font = `bold ${Math.max(9, Math.round(tfs * 0.75))}px Courier New`;
  ctx.fillStyle = '#000';
  ctx.textAlign = 'center';
  ctx.fillText('\u26CF', s.x, s.y + 4);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

// === SIDEBAR ===
function buildLegend() {
  const el = document.getElementById('legend');
  let html = '<div style="font-weight:bold;margin-bottom:4px;color:#fff;font-size:12px">Products</div>';
  for (const name of Object.keys(COMPONENT_META).sort()) {
    html += `<div class="row"><span class="ic">${ICON_SVG[name] || ''}</span>${name}</div>`;
  }
  html += '<div style="margin-top:6px;font-weight:bold;color:#fff;font-size:12px">Resource Types</div>';
  const types = ['iron','limestone','copper','coal','oil','caterium','bauxite','quartz','sulfur','sam','uranium','nitrogen','water'];
  for (const t of types) {
    html += `<div class="row"><span class="ic">${ICON_SVG[t] || ''}</span>${t}</div>`;
  }
  html += '<div style="margin-top:6px;font-weight:bold;color:#fff;font-size:12px">Purity</div>';
  html += '<div class="row"><span class="dot" style="background:#ccc;width:13px;height:13px"></span>Pure (large)</div>';
  html += '<div class="row"><span class="dot" style="background:#ccc;width:10px;height:10px"></span>Normal</div>';
  html += '<div class="row"><span class="dot" style="background:#ccc;width:7px;height:7px"></span>Impure (small)</div>';
  el.innerHTML = html;
}

function buildSidebar() {
  const el = document.getElementById('factory-list');
  let html = '';
  for (const [fid, f] of Object.entries(FACTORIES)) {
    const color = FACTORY_COLORS[fid];
    const resSummary = Object.entries(f.resources).map(([rt, rd]) =>
      `${rt}: ${rd.pure}P/${rd.normal}N/${rd.impure}I`
    ).join(', ');
    html += `<div class="factory-section" id="fsec-${fid}">`;
    html += `<div class="factory-header"><input type="checkbox" checked onchange="toggleVis('${fid}',this.checked)" style="accent-color:${color}"><span class="factory-swatch" style="background:${color}"></span><span class="factory-name">${f.name}</span></div>`;
    html += `<div class="factory-theme">${f.theme}</div>`;
    html += `<div class="factory-resources">${f.totalNodes} nodes: ${resSummary}</div>`;
    html += `<button class="zoom-btn" onclick="zoomTo('${fid}')">Zoom to ${f.name} &rarr;</button>`;
    html += `</div>`;
  }

  // Mining towns
  html += '<div style="padding:8px 12px;border-bottom:1px solid #333;font-weight:bold;font-size:12px;color:#fff;background:#16213e;letter-spacing:1px;text-transform:uppercase">Mining Towns</div>';
  for (const mt of MINING_TOWNS) {
    html += `<div class="factory-section" id="tsec-${mt.id}">`;
    html += `<div class="factory-header"><input type="checkbox" checked onchange="toggleTownVis('${mt.id}',this.checked)" style="accent-color:${mt.color}"><span class="factory-swatch" style="background:${mt.color};transform:rotate(45deg)"></span><span class="factory-name">${mt.name}</span></div>`;
    html += `<div class="factory-theme">${mt.theme}</div>`;
    html += `<div class="factory-resources">${mt.nodeCount} ${mt.resource} nodes | ${mt.capacity}/min capacity</div>`;
    html += `<div class="factory-resources">${mt.purity.pure}P / ${mt.purity.normal}N / ${mt.purity.impure}I</div>`;
    html += `<div class="factory-resources" style="margin-top:4px">Supplies:</div>`;
    for (const s of mt.supplies) {
      html += `<div class="factory-resources" style="color:#aaa">&nbsp;&bull; ${s}</div>`;
    }
    html += `<button class="zoom-btn" onclick="zoomToTown('${mt.id}')">Zoom to ${mt.name} &rarr;</button>`;
    html += `</div>`;
  }

  // Gap supply-chain factories (auto-placed)
  if (GAP_FACTORIES.length) {
    const totalShards = GAP_FACTORIES.reduce((a,g)=>a+(g.shards||0),0);
    const totalBldgs  = GAP_FACTORIES.reduce((a,g)=>a+(g.buildings||0),0);
    html += `<div style="padding:8px 12px;border-bottom:1px solid #333;font-weight:bold;font-size:12px;color:#fff;background:#16213e;letter-spacing:1px;text-transform:uppercase">Gap Factories <span style="color:#888;text-transform:none">(${totalBldgs} bldgs, ${totalShards} shards)</span></div>`;
    for (const gf of GAP_FACTORIES) {
      const color = GAP_COLORS[gf.disp] || '#2ecc71';
      html += `<div class="factory-section" id="gsec-${gf.id}">`;
      html += `<div class="factory-header"><input type="checkbox" checked onchange="toggleGapVis('${gf.id}',this.checked)" style="accent-color:${color}"><span class="factory-swatch" style="background:${color}"></span><span class="factory-name">${gf.name}</span></div>`;
      html += `<div class="factory-theme">${gf.theme} &middot; sig: ${gf.sig}</div>`;
      html += `<div class="factory-resources">${gf.disp}${gf.infeasible ? ' <span style="color:#ff6b6b">&#9888; shortfall ' + gf.shortfall + '/min</span>' : ''}</div>`;
      const imp = (gf.imports||[]).length ? ` &middot; imports: ${gf.imports.join(', ')}` : '';
      html += `<div class="factory-resources">${gf.buildings||0} bldgs &middot; ${gf.power_mw||0} MW &middot; ${gf.shards||0} shards${imp}</div>`;
      const outNote = (gf.outposts||[]).length === 0 ? ' &middot; trained resources via mining towns' : '';
      html += `<div class="factory-resources">${(gf.sites||[]).length} site(s), ${(gf.outposts||[]).length} outpost(s)${outNote}</div>`;
      html += `<button class="zoom-btn" onclick="zoomToGap('${gf.id}')">Zoom to ${gf.name} &rarr;</button>`;
      html += `</div>`;
    }
  }

  // Gap mining towns (shared outposts for high-volume trained resources)
  if (typeof GAP_TOWNS !== 'undefined' && GAP_TOWNS.length) {
    const tShards = GAP_TOWNS.reduce((a,t)=>a+(t.sh||0),0);
    html += `<div style="padding:8px 12px;border-bottom:1px solid #333;font-weight:bold;font-size:12px;color:#fff;background:#16213e;letter-spacing:1px;text-transform:uppercase">Gap Mining Towns <span style="color:#888;text-transform:none">(${GAP_TOWNS.length} towns, ${tShards} shards)</span></div>`;
    for (const gt of GAP_TOWNS) {
      const color = RESOURCE_COLORS[gt.r] || '#aaa';
      const sup = (gt.supplies||[]).map(s => `${s.factory} (${s.amount_per_min}/min)`).join(', ');
      html += `<div class="factory-section" id="gtsec-${gt.id}">`;
      html += `<div class="factory-header"><input type="checkbox" checked onchange="toggleGapTown('${gt.id}',this.checked)" style="accent-color:${color}"><span class="factory-swatch" style="background:${color};transform:rotate(45deg)"></span><span class="factory-name">${gt.name}</span></div>`;
      html += `<div class="factory-theme">${gt.r} &middot; ${gt.nodes.length} nodes &middot; ${gt.cap}/min cap &middot; ${gt.sh} shards</div>`;
      html += `<div class="factory-resources">Supplies: ${sup}</div>`;
      html += `<button class="zoom-btn" onclick="zoomToGapTown('${gt.id}')">Zoom to ${gt.name} &rarr;</button>`;
      html += `</div>`;
    }
  }

  el.innerHTML = html;
}

function toggleGapTown(tid, on) {
  gapTownVisible[tid] = on;
  document.getElementById('gtsec-' + tid).classList.toggle('hidden-factory', !on);
  draw();
}

function zoomToGapTown(tid) {
  const gt = GAP_TOWNS.find(t => t.id === tid);
  if (!gt) return;
  viewX = gt.cx; viewY = gt.cy; zoom = 0.004; draw();
}

function toggleVis(fid, on) {
  visible[fid] = on;
  document.getElementById('fsec-' + fid).classList.toggle('hidden-factory', !on);
  draw();
}

function zoomTo(fid) {
  const f = FACTORIES[fid];
  viewX = f.cx;
  viewY = f.cy;
  zoom = 0.004;
  draw();
}

function toggleTownVis(tid, on) {
  townVisible[tid] = on;
  document.getElementById('tsec-' + tid).classList.toggle('hidden-factory', !on);
  draw();
}

function zoomToTown(tid) {
  const mt = MINING_TOWNS.find(t => t.id === tid);
  if (!mt) return;
  viewX = mt.cx;
  viewY = mt.cy;
  zoom = 0.004;
  draw();
}

function toggleGapVis(gid, on) {
  gapVisible[gid] = on;
  document.getElementById('gsec-' + gid).classList.toggle('hidden-factory', !on);
  draw();
}

function zoomToGap(gid) {
  const gf = GAP_FACTORIES.find(g => g.id === gid);
  if (!gf || !gf.sites || !gf.sites.length) return;
  viewX = gf.sites[0].x;
  viewY = gf.sites[0].y;
  zoom = 0.004;
  draw();
}

function resetView() {
  viewX = MAP_CX;
  viewY = MAP_CY;
  fitZoom();
  draw();
  updateZoomReadout();
}

function exportSelections() {
  const result = {
    meta: {
      description: 'Selected factory and mining town locations for Satisfactory',
      exported_at: new Date().toISOString(),
      coordinate_system: {
        x: 'positive = east/right',
        y: 'positive = south/bottom',
        units: 'centimeters (100 units = 1 meter)'
      }
    },
    selections: {}
  };
  for (const [fid, f] of Object.entries(FACTORIES)) {
    result.selections[fid] = {
      factory_name: f.name,
      theme: f.theme,
      center: {x: f.cx, y: f.cy},
      required_resources: f.req,
      total_nodes: f.totalNodes,
      resources: f.resources,
      nodes: f.nodes,
    };
  }
  for (const mt of MINING_TOWNS) {
    result.selections[mt.id] = {
      factory_name: mt.name,
      theme: mt.theme,
      type: 'mining_town',
      center: {x: mt.cx, y: mt.cy},
      required_resources: [mt.resource],
      total_nodes: mt.nodeCount,
      capacity_per_min: mt.capacity,
      supplies: mt.supplies,
      purity: mt.purity,
      nodes: mt.nodes,
    };
  }
  for (const gf of GAP_FACTORIES) {
    result.selections[gf.id] = {
      factory_name: gf.name,
      theme: gf.theme,
      group: 'gap',
      disposition: gf.disp,
      signature_resource: gf.sig,
      infeasible: !!gf.infeasible,
      shortfall_per_min: gf.shortfall || 0,
      buildings: gf.buildings || 0,
      power_mw: gf.power_mw || 0,
      shards: gf.shards || 0,
      imports: gf.imports || [],
      center: (gf.sites && gf.sites[0]) ? {x: gf.sites[0].x, y: gf.sites[0].y} : null,
      sites: gf.sites || [],
      outposts: gf.outposts || [],
    };
  }
  if (typeof GAP_TOWNS !== 'undefined') {
    for (const gt of GAP_TOWNS) {
      result.selections[gt.id] = {
        factory_name: gt.name,
        type: 'mining_town', group: 'gap',
        resource: gt.r,
        center: {x: gt.cx, y: gt.cy},
        capacity_per_min: gt.cap,
        shards: gt.sh,
        supplies: gt.supplies,
        nodes: gt.nodes,
      };
    }
  }
  const blob = new Blob([JSON.stringify(result, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'selected-factory-locations.json';
  a.click();
  URL.revokeObjectURL(url);
}

// === INTERACTION ===
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const mg = s2g(e.offsetX, e.offsetY);
  const factor = e.deltaY > 0 ? 0.88 : 1.14;
  zoom = Math.max(0.0003, Math.min(0.05, zoom * factor));
  viewX = mg.x - (e.offsetX - W / 2) / zoom;
  viewY = mg.y - (e.offsetY - H / 2) / zoom;
  draw();
  updateZoomReadout();
}, {passive: false});

canvas.addEventListener('dblclick', (e) => {
  e.preventDefault();
  zoomAtScreen(1.6, e.offsetX, e.offsetY);
});

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0) {
    dragging = true;
    dragMoved = false;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragViewX = viewX;
    dragViewY = viewY;
    canvas.classList.add('grabbing');
  }
});

window.addEventListener('mousemove', (e) => {
  if (dragging) {
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    if (!dragMoved && (dx * dx + dy * dy) > 16) dragMoved = true; // >4px = a pan, not a click
    viewX = dragViewX - dx / zoom;
    viewY = dragViewY - dy / zoom;
    draw();
  }
  // Tooltip for factory centers
  if (!dragging) {
    const mg = s2g(e.clientX - canvas.getBoundingClientRect().left,
                    e.clientY - canvas.getBoundingClientRect().top);
    let hit = null;
    for (const [fid, f] of Object.entries(FACTORIES)) {
      if (!visible[fid]) continue;
      const dx = mg.x - f.cx, dy = mg.y - f.cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const hitR = 15 / zoom;
      if (dist < hitR) { hit = {fid, f}; break; }
    }
    // Also check mining towns
    let hitTown = null;
    if (!hit) {
      for (const mt of MINING_TOWNS) {
        if (!townVisible[mt.id]) continue;
        const dx = mg.x - mt.cx, dy = mg.y - mt.cy;
        const d = Math.sqrt(dx * dx + dy * dy);
        const hitR = 15 / zoom;
        if (d < hitR) { hitTown = mt; break; }
      }
    }
    // Gap factory hit (any site)
    let hitGap = null;
    if (!hit && !hitTown) {
      for (const gf of GAP_FACTORIES) {
        if (!gapVisible[gf.id] || !gf.sites) continue;
        for (let i = 0; i < gf.sites.length; i++) {
          const s = gf.sites[i];
          const dx = mg.x - s.x, dy = mg.y - s.y;
          if (Math.sqrt(dx*dx + dy*dy) < 15 / zoom) {
            hitGap = {gf, siteIdx: i}; break;
          }
        }
        if (hitGap) break;
      }
    }
    // Gap mining town hit
    let hitGapTown = null;
    if (!hit && !hitTown && !hitGap && typeof GAP_TOWNS !== 'undefined') {
      for (const gt of GAP_TOWNS) {
        if (!gapTownVisible[gt.id]) continue;
        const dx = mg.x - gt.cx, dy = mg.y - gt.cy;
        if (Math.sqrt(dx*dx + dy*dy) < 15 / zoom) { hitGapTown = gt; break; }
      }
    }
    let newHoverKey = null;
    if (hit) newHoverKey = 'fc:' + hit.fid;
    else if (hitTown) newHoverKey = 'tc:' + hitTown.id;
    else if (hitGap) newHoverKey = 'gc:' + hitGap.gf.id + ':' + hitGap.siteIdx;
    else if (hitGapTown) newHoverKey = 'gt:' + hitGapTown.id;
    if (newHoverKey !== hoverKey) { hoverKey = newHoverKey; draw(); }
    if (hit) {
      showTooltip(baseTooltipHtml(hit.fid, hit.f), e.clientX, e.clientY);
    } else if (hitTown) {
      let tt = `<b>${hitTown.name}</b> (${hitTown.theme})<br>`;
      tt += `${hitTown.nodeCount} ${hitTown.resource} nodes | ${hitTown.capacity}/min<br>`;
      tt += `${hitTown.purity.pure}P / ${hitTown.purity.normal}N / ${hitTown.purity.impure}I<br>`;
      tt += `Supplies: ${hitTown.supplies.join(', ')}`;
      showTooltip(tt, e.clientX, e.clientY);
    } else if (hitGap) {
      showTooltip(gapTooltipHtml(hitGap.gf, hitGap.siteIdx), e.clientX, e.clientY);
    } else if (hitGapTown) {
      showTooltip(gapTownTooltipHtml(hitGapTown), e.clientX, e.clientY);
    } else if (!tooltipPinned) {
      tooltip.style.display = 'none';
    }
  }
});

let tooltipPinned = false;
function showTooltip(html, x, y) {
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (x + 14) + 'px';
  tooltip.style.top = (y + 14) + 'px';
}
// Factory hover = ONLY the final components it produces (everything else is noise).
function gapTooltipHtml(gf, siteIdx) {
  let tt = `<b>${gf.name}</b>`;
  if (gf.infeasible) tt += ` <span style="color:#ff6b6b">&#9888;</span>`;
  const th = FACTORY_THEMES[gf.id];
  if (th) {
    tt += `<br><span style="color:#ffd479">${th.theme}</span>`;
    tt += `<br><span style="color:#9fb0c8">Inputs:</span> ${th.inputs}`;
  }
  tt += `<br><span style="color:#9fb0c8">Produces:</span><br>`;
  const prods = gf.prod || [];
  if (!prods.length) return tt + `&nbsp;&nbsp;<i>—</i>`;
  for (const p of prods) {
    const item = (typeof p === 'string') ? p : p.item;
    const amt = (typeof p === 'object' && p.amt != null) ? ` &mdash; ${p.amt}/min` : '';
    tt += `&nbsp;&nbsp;<b>${item}</b>${amt}<br>`;
  }
  return tt;
}
// Base (built) factory hover = its produced components too.
function baseTooltipHtml(fid, f) {
  let tt = `<b>${f.name}</b>`;
  const th = FACTORY_THEMES[fid];
  if (th) {
    tt += `<br><span style="color:#ffd479">${th.theme}</span>`;
    tt += `<br><span style="color:#9fb0c8">Inputs:</span> ${th.inputs}`;
  }
  tt += `<br><span style="color:#9fb0c8">Produces:</span><br>`;
  const prods = BASE_FACTORY_PROD[fid] || [];
  if (!prods.length) return tt + `&nbsp;&nbsp;<i>—</i>`;
  for (const item of prods) tt += `&nbsp;&nbsp;<b>${item}</b><br>`;
  return tt;
}
function gapTownTooltipHtml(gt) {
  let tt = `<b>${gt.name}</b> &middot; ${gt.r}<br>`;
  tt += `${gt.nodes.length} nodes &middot; ${gt.cap}/min cap &middot; ${gt.sh} shards<br>`;
  tt += `<b>Supplies:</b><br>`;
  for (const s of (gt.supplies||[])) {
    tt += `&nbsp;&nbsp;${s.factory}: ${s.amount_per_min}/min<br>`;
  }
  return tt;
}

// Screen-space hit-test for occupied nodes; returns the closest node within
// a radius scaled to the drawn marker, or null. Used by the click handler.
function hitOccupiedNode(sx, sy) {
  let best = null, bestD = Infinity;
  for (const node of OCC_NODES) {
    const s = g2s(node.x, node.y);
    const dx = s.x - sx, dy = s.y - sy;
    const d = Math.sqrt(dx * dx + dy * dy);
    // Radius ~ drawn ring size, with a small floor for easy clicking.
    const r = Math.max(8, nodeIconSize(node.p) / 2 + 5);
    if (d <= r && d < bestD) { best = node; bestD = d; }
  }
  return best;
}

// Click / tap: pin tooltip persistently (works on touch where mousemove
// doesn't fire). Click again on empty space to dismiss.
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const mg = s2g(sx, sy);

  // Occupied-node toggle takes priority when the overlay is visible.
  // Suppress it when this "click" is actually the tail of a pan-drag, so
  // panning across the map never silently flips a node's reuse state.
  if (!dragMoved && (showOccupied || pickerMode) && occLoaded && OCC_NODES.length) {
    const occHit = hitOccupiedNode(sx, sy);
    if (occHit) { toggleReuse(occHit.id); return; }
  }

  let html = null;
  for (const [fid, f] of Object.entries(FACTORIES)) {
    if (!visible[fid]) continue;
    const dx = mg.x - f.cx, dy = mg.y - f.cy;
    if (Math.sqrt(dx*dx + dy*dy) < 15 / zoom) {
      html = `<b>${f.name}</b> (${f.theme})<br>${f.totalNodes} resource nodes`;
      break;
    }
  }
  if (!html) for (const mt of MINING_TOWNS) {
    if (!townVisible[mt.id]) continue;
    const dx = mg.x - mt.cx, dy = mg.y - mt.cy;
    if (Math.sqrt(dx*dx + dy*dy) < 15 / zoom) {
      html = `<b>${mt.name}</b> (${mt.theme})<br>${mt.nodeCount} ${mt.resource} nodes | ${mt.capacity}/min<br>Supplies: ${mt.supplies.join(', ')}`;
      break;
    }
  }
  if (!html) for (const gf of GAP_FACTORIES) {
    if (!gapVisible[gf.id] || !gf.sites) continue;
    for (let i=0; i<gf.sites.length; i++) {
      const s = gf.sites[i];
      const dx = mg.x - s.x, dy = mg.y - s.y;
      if (Math.sqrt(dx*dx + dy*dy) < 15 / zoom) { html = gapTooltipHtml(gf, i); break; }
    }
    if (html) break;
  }
  if (!html && typeof GAP_TOWNS !== 'undefined') for (const gt of GAP_TOWNS) {
    if (!gapTownVisible[gt.id]) continue;
    const dx = mg.x - gt.cx, dy = mg.y - gt.cy;
    if (Math.sqrt(dx*dx + dy*dy) < 15 / zoom) { html = gapTownTooltipHtml(gt); break; }
  }
  if (html) {
    tooltipPinned = true;
    showTooltip(html, e.clientX, e.clientY);
  } else {
    tooltipPinned = false;
    tooltip.style.display = 'none';
  }
});

window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.classList.remove('grabbing');
});

document.getElementById('export-btn').addEventListener('click', exportSelections);
document.getElementById('reset-btn').addEventListener('click', resetView);
document.getElementById('zoom-in-btn').addEventListener('click', () => zoomAtScreen(1.3));
document.getElementById('zoom-out-btn').addEventListener('click', () => zoomAtScreen(1/1.3));
document.getElementById('zoom-fit-btn').addEventListener('click', () => { resetView(); });

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
  // Don't hijack typing in inputs/selects
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  if (e.key === 'r') resetView();
  if (e.key === 'e') exportSelections();
  // Zoom controls (note: '+' arrives as '=' without shift on many layouts)
  if (e.key === '+' || e.key === '=') { zoomAtScreen(1.3); return; }
  if (e.key === '-' || e.key === '_') { zoomAtScreen(1/1.3); return; }
  if (e.key === '0') { resetView(); return; }
  const fids = Object.keys(FACTORIES);
  const num = parseInt(e.key);
  // 1..9 only — '0' handled above and must not reach zoomTo
  if (num >= 1 && num <= fids.length) zoomTo(fids[num - 1]);
});

// === INIT ===
function fitZoom() {
  zoom = Math.min(W / MAP_W, H / MAP_H) * 0.9;
}

function resize() {
  const rect = canvas.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W;
  canvas.height = H;
}

function init() {
  resize();
  fitZoom();
  for (const k of Object.keys(ICON_SVG)) getIconImage(k);  // warm the cache
  populateComponentFilter();
  buildLegend();
  buildSidebar();
  loadOccupied();
  draw();
  updateZoomReadout();
}

window.addEventListener('resize', () => { resize(); draw(); });
init();
</script>
</body>
</html>
